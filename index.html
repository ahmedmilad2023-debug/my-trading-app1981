    <style>
        /* ===== style.css ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --bg-hover: #252d3f;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --green: #00c897;
            --red: #f6465d;
            --blue: #58a6ff;
            --orange: #f0883e;
            --gold: #f0b90b;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        button {
            font-family: var(--font);
            cursor: pointer;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            transition: var(--transition);
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 16px 100px;
        }
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px; color: #0d1117;
        }
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .logo-text span { color: var(--gold); }
        .header-actions {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .header-actions button {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 6px;
        }
        .header-actions button:hover { background: var(--bg-hover); border-color: var(--text-muted); }
        .header-actions .btn-install {
            background: var(--gold); color: #0d1117; border-color: var(--gold); font-weight: 600;
        }
        .header-actions .btn-install:hover { background: #d4a00e; border-color: #d4a00e; }
        .badge-online {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--green);
            background: rgba(0,200,151,0.12);
            padding: 4px 12px; border-radius: 20px;
            border: 1px solid rgba(0,200,151,0.2);
        }
        .badge-online .dot {
            width: 8px; height: 8px; background: var(--green); border-radius: 50%;
            animation: pulse-dot 1.6s infinite;
        }
        @keyframes pulse-dot { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.5; transform:scale(0.8); } }
        .coin-strip {
            display: flex; gap: 10px; overflow-x: auto; padding: 16px 0 12px;
            scrollbar-width: thin; -webkit-overflow-scrolling: touch;
        }
        .coin-strip::-webkit-scrollbar { height: 3px; }
        .coin-strip::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .coin-item {
            flex: 0 0 auto; padding: 10px 18px; background: var(--bg-card);
            border-radius: var(--radius-sm); border: 1px solid var(--border-color);
            cursor: pointer; transition: var(--transition); min-width: 140px;
            position: relative;
        }
        .coin-item:hover { background: var(--bg-hover); border-color: var(--text-muted); }
        .coin-item.active { border-color: var(--gold); background: rgba(240,185,11,0.08); }
        .coin-item .symbol { font-weight: 600; font-size: 14px; }
        .coin-item .price { font-size: 15px; font-weight: 600; margin-top: 2px; }
        .coin-item .change { font-size: 12px; font-weight: 500; }
        .coin-item .change.positive { color: var(--green); }
        .coin-item .change.negative { color: var(--red); }
        .coin-item .signals-badge {
            position: absolute; top: -6px; right: -6px;
            background: var(--red); color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 12px;
            min-width: 20px; text-align: center;
        }
        .main-grid {
            display: grid; grid-template-columns: 1fr 360px; gap: 16px; margin-top: 8px;
        }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        .chart-section {
            background: var(--bg-secondary); border-radius: var(--radius);
            border: 1px solid var(--border-color); overflow: hidden; padding: 12px;
        }
        .chart-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 10px; flex-wrap: wrap; gap: 8px;
        }
        .chart-header .left { display: flex; align-items: center; gap: 12px; }
        .chart-header .left h3 { font-size: 18px; font-weight: 600; }
        .chart-header .left .tf-selector {
            display: flex; gap: 4px; background: var(--bg-primary);
            border-radius: var(--radius-sm); padding: 2px;
        }
        .chart-header .left .tf-selector button {
            padding: 4px 12px; font-size: 12px; border-radius: 6px;
            font-weight: 500; color: var(--text-secondary);
        }
        .chart-header .left .tf-selector button.active {
            background: var(--bg-card); color: var(--text-primary);
        }
        .chart-header .left .tf-selector button:hover { color: var(--text-primary); }
        .chart-header .right { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        #chartContainer {
            width: 100%; height: 420px; position: relative;
            background: var(--bg-primary); border-radius: var(--radius-sm); overflow: hidden;
        }
        .status-bar {
            font-size: 11px; color: var(--text-muted);
            display: flex; justify-content: space-between;
            padding: 4px 0 0; border-top: 1px solid var(--border-color);
            margin-top: 8px; flex-wrap: wrap; gap: 4px;
        }
        .sidebar { display: flex; flex-direction: column; gap: 16px; }
        .sidebar-card {
            background: var(--bg-secondary); border-radius: var(--radius);
            border: 1px solid var(--border-color); padding: 14px 16px;
            max-height: 600px; overflow-y: auto;
        }
        .sidebar-card h4 {
            font-size: 14px; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 12px; display: flex; justify-content: space-between;
        }
        .sidebar-card h4 .count {
            font-size: 12px; background: var(--bg-card); padding: 2px 10px;
            border-radius: 12px; color: var(--text-primary);
        }
        .signal-item {
            background: var(--bg-card); border-radius: var(--radius-sm);
            padding: 14px; margin-bottom: 12px;
            border-left: 4px solid var(--gold); transition: var(--transition);
        }
        .signal-item.buy { border-left-color: var(--green); }
        .signal-item.sell { border-left-color: var(--red); }
        .signal-item .signal-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
        .signal-item .signal-type {
            font-weight: 700; font-size: 16px; padding: 2px 12px; border-radius: 6px;
            background: rgba(0,200,151,0.15); color: var(--green);
        }
        .signal-item .signal-type.sell { background: rgba(246,70,93,0.15); color: var(--red); }
        .signal-item .signal-coin { font-weight: 600; font-size: 14px; color: var(--text-secondary); }
        .signal-item .signal-time { font-size: 11px; color: var(--text-muted); }
        .signal-item .signal-price { font-size: 15px; font-weight: 600; margin-top: 4px; }
        .signal-item .signal-details {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; font-size: 12px;
            color: var(--text-secondary);
        }
        .signal-item .signal-details span {
            background: var(--bg-primary); padding: 4px 8px; border-radius: 4px; text-align: center;
        }
        .signal-item .signal-details .label { color: var(--text-muted); font-size: 10px; display: block; }
        .signal-item .signal-reason {
            margin-top: 10px; font-size: 12px; color: var(--text-secondary);
            background: var(--bg-primary); padding: 10px 12px; border-radius: 6px;
            border-left: 2px solid var(--gold); line-height: 1.6; max-height: 80px; overflow-y: auto;
        }
        .signal-item .signal-actions {
            display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap;
        }
        .signal-item .signal-actions button {
            padding: 4px 12px; font-size: 11px; border-radius: 6px;
            background: var(--bg-primary); border: 1px solid var(--border-color);
            color: var(--text-secondary); display: flex; align-items: center; gap: 4px;
        }
        .signal-item .signal-actions button:hover { background: var(--bg-hover); color: var(--text-primary); }
        .signal-item .signal-actions .btn-delete { color: var(--red); }
        .signal-item .signal-actions .btn-delete:hover { background: rgba(246,70,93,0.15); }
        .signal-item .signal-winrate { font-size: 12px; font-weight: 600; color: var(--gold); margin-top: 6px; }
        .archive-item {
            background: var(--bg-card); border-radius: var(--radius-sm);
            padding: 12px; margin-bottom: 10px;
            border-left: 3px solid var(--text-muted); font-size: 13px;
        }
        .archive-item .arch-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .archive-item .arch-coin { font-weight: 600; }
        .archive-item .arch-result {
            font-weight: 600; padding: 2px 10px; border-radius: 4px; font-size: 12px;
        }
        .archive-item .arch-result.win { color: var(--green); background: rgba(0,200,151,0.12); }
        .archive-item .arch-result.loss { color: var(--red); background: rgba(246,70,93,0.12); }
        .archive-item .arch-result.pending { color: var(--orange); background: rgba(240,136,62,0.12); }
        .archive-item .arch-details {
            display: flex; gap: 12px; font-size: 12px; color: var(--text-secondary); margin-top: 6px; flex-wrap: wrap;
        }
        .archive-item .arch-reason { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .empty-state {
            text-align: center; color: var(--text-muted); padding: 30px 10px; font-size: 14px;
        }
        .notif-bell { position: relative; cursor: pointer; }
        .notif-bell .badge {
            position: absolute; top: -4px; right: -4px;
            background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
            padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center;
        }
        .notif-dropdown {
            display: none; position: absolute; top: 40px; right: 0;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 12px; width: 320px;
            max-height: 400px; overflow-y: auto; z-index: 100; box-shadow: var(--shadow);
        }
        .notif-dropdown.open { display: block; }
        .notif-dropdown .notif-item { padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .notif-dropdown .notif-item:last-child { border-bottom: none; }
        .notif-dropdown .notif-item .ntime { font-size: 10px; color: var(--text-muted); }
        .toast-container {
            position: fixed; bottom: 80px; right: 20px; z-index: 999;
            display: flex; flex-direction: column; gap: 8px; max-width: 360px;
        }
        .toast {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); padding: 12px 18px; font-size: 14px;
            box-shadow: var(--shadow); animation: slideUp 0.3s ease;
            display: flex; align-items: center; gap: 10px;
        }
        .toast.success { border-left: 4px solid var(--green); }
        .toast.error { border-left: 4px solid var(--red); }
        .toast.info { border-left: 4px solid var(--blue); }
        .toast .toast-close { cursor: pointer; color: var(--text-muted); font-size: 18px; margin-left: auto; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .switch-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary); margin-top: 8px;
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-hover); transition: .3s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: var(--text-muted);
            transition: .3s; border-radius: 50%;
        }
        .switch input:checked + .slider { background-color: var(--gold); }
        .switch input:checked + .slider:before { transform: translateX(18px); background-color: #0d1117; }
        .install-banner {
            display: none; background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 12px 18px; margin-bottom: 12px;
            align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .install-banner.show { display: flex; }
        .install-banner .ib-btn {
            background: var(--gold); color: #0d1117; padding: 6px 20px;
            border-radius: var(--radius-sm); font-weight: 600; font-size: 14px;
        }
        .install-banner .ib-btn:hover { background: #d4a00e; }
        .install-banner .ib-close { color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .data-error-banner {
            display: none; background: rgba(246,70,93,0.12); border: 1px solid var(--red);
            border-radius: var(--radius); padding: 12px 18px; margin-bottom: 12px;
            font-size: 13px; color: var(--text-primary); line-height: 1.6;
        }
        .data-error-banner.show { display: block; }
        @media (max-width: 640px) {
            .app-container { padding: 8px 10px 90px; }
            #chartContainer { height: 280px; }
            .main-grid { gap: 12px; }
            .coin-item { min-width: 110px; padding: 8px 12px; }
            .coin-item .symbol { font-size: 12px; }
            .coin-item .price { font-size: 13px; }
            .sidebar-card { max-height: 500px; }
            .signal-item .signal-details { grid-template-columns: 1fr 1fr; }
            .header-actions .badge-online span { display: none; }
            .logo-text { font-size: 17px; }
            .chart-header .left h3 { font-size: 15px; }
            .notif-dropdown { width: 280px; right: -60px; }
        }
        @media (max-width: 400px) {
            .coin-item { min-width: 90px; padding: 6px 10px; }
            .coin-item .price { font-size: 11px; }
            .signal-item .signal-details { grid-template-columns: 1fr; }
            #chartContainer { height: 220px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">

    <div class="install-banner" id="installBanner">
        <div class="ib-text"><span class="icon">📲</span><span>ثبّت تطبيق ProTrade للوصول السريع</span></div>
        <div>
            <button class="ib-btn" id="installBtn">تثبيت</button>
            <button class="ib-close" id="dismissInstall">✕</button>
        </div>
    </div>

    <div class="data-error-banner" id="dataErrorBanner"></div>

    <header class="app-header">
        <div class="logo-area"><div class="logo-icon">P</div><div class="logo-text">Pro<span>Trade</span></div></div>
        <div class="header-actions">
            <span class="badge-online"><span class="dot"></span><span>مباشر</span></span>
            <div class="notif-bell" id="notifBell">
                🔔<span class="badge" id="notifBadge" style="display:none;">0</span>
                <div class="notif-dropdown" id="notifDropdown">
                    <div style="font-weight:600;font-size:14px;margin-bottom:8px;">الإشعارات</div>
                    <div id="notifList"><div class="empty-state">لا توجد إشعارات</div></div>
                </div>
            </div>
            <button id="refreshBtn">🔄</button>
            <button class="btn-install" id="installHeaderBtn">📲 تثبيت</button>
        </div>
    </header>

    <div class="coin-strip" id="coinStrip"></div>

    <div class="main-grid">
        <section class="chart-section">
            <div class="chart-header">
                <div class="left">
                    <h3 id="chartTitle">BTC/USDT</h3>
                    <div class="tf-selector" id="tfSelector">
                        <button data-tf="1m">1د</button>
                        <button data-tf="5m" class="active">5د</button>
                        <button data-tf="15m">15د</button>
                        <button data-tf="1h">1س</button>
                        <button data-tf="4h">4س</button>
                        <button data-tf="1d">يوم</button>
                    </div>
                </div>
                <div class="right">
                    <span id="chartPrice">--</span>
                    <span id="chartChange" style="font-weight:600;">--</span>
                </div>
            </div>
            <div id="chartContainer"></div>
            <div class="status-bar">
                <span id="lastUpdate">آخر تحديث: --</span>
                <span id="dataStatus">✅ متصل</span>
            </div>
            <div class="switch-container">
                <span>🔗 فلتر الارتباط:</span>
                <label class="switch"><input type="checkbox" id="correlationSwitch" checked><span class="slider"></span></label>
                <span id="correlationStatus" style="font-weight:500;color:var(--gold);">مفعل</span>
            </div>
        </section>

        <aside class="sidebar">
            <div class="sidebar-card" id="signalsCard">
                <h4>📊 الإشارات <span class="count" id="signalsCount">0</span></h4>
                <div id="signalsList"><div class="empty-state">⏳ جاري تحليل السوق...</div></div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button id="toggleArchive" style="flex:1;padding:8px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);font-weight:500;font-size:13px;">📂 الأرشيف</button>
            </div>
            <div class="sidebar-card" id="archiveCard" style="display:none;max-height:400px;">
                <h4>📂 الأرشيف <span class="count" id="archiveCount">0</span></h4>
                <div id="archiveList"><div class="empty-state">لا توجد صفقات في الأرشيف</div></div>
            </div>
        </aside>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    // ============================================================
    // FULL APPLICATION CODE - FIXED DATA FETCHING
    // ============================================================
    (function() {
        'use strict';

        // CONFIG
        const SYMBOLS = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','LINKUSDT','AVAXUSDT','SUIUSDT'];
        const DISPLAY_MAP = { BTCUSDT:'BTC/USDT', ETHUSDT:'ETH/USDT', BNBUSDT:'BNB/USDT', SOLUSDT:'SOL/USDT', XRPUSDT:'XRP/USDT', DOGEUSDT:'DOGE/USDT', ADAUSDT:'ADA/USDT', LINKUSDT:'LINK/USDT', AVAXUSDT:'AVAX/USDT', SUIUSDT:'SUI/USDT' };
        const DEFAULT_TF = '5m';
        const MAX_CANDLES = 300;
        // Several public Binance REST hosts. If one is blocked/rate-limited/geo-restricted
        // for the visitor, the app rotates to the next one automatically.
        const REST_HOSTS = ['https://api.binance.com','https://api1.binance.com','https://api2.binance.com','https://api3.binance.com','https://data-api.binance.vision'];

        // STATE
        let state = {
            currentSymbol: 'BTCUSDT',
            currentTF: DEFAULT_TF,
            candles: {},
            realtimePrice: {},
            signals: [],
            archive: [],
            notifications: [],
            isConnected: false,
            ws: null,
            analysisInterval: null,

        // ============================================================
        // API - FIXED WITH RETRY, HOST ROTATION & ERROR HANDLING
        // ============================================================
        class Api {
            static async fetchWithRetry(path, options={}, retries=3) {
                let lastErr=null;
                for(let h=0; h<REST_HOSTS.length; h++) {
                    const url = REST_HOSTS[h]+path;
                    for(let i=0;i<retries;i++) {
                        try {
                            const resp = await fetch(url, options);
                            if(resp.status===451 || resp.status===403) {
                                lastErr = new Error(`HTTP ${resp.status} (محظور جغرافياً من هذا المضيف)`);
                                break; // try next host, retrying the same blocked host is useless
                            }
                            if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            return await resp.json();
                        } catch(e) {
                            lastErr = e;
                            if(i<retries-1) await Utils.sleep(800*(i+1));
                        }
                    }
                }
                throw lastErr || new Error('فشل الاتصال بجميع مضيفات Binance');
            }

            static async fetchKlines(symbol, interval, limit=MAX_CANDLES) {
                const path = `/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
                const data = await this.fetchWithRetry(path);
                return data.map(k => ({
                    time: k[0],
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4]),
                    volume: parseFloat(k[5])
                }));
            }

            static async fetch24hr(symbol) {
                const path = `/api/v3/ticker/24hr?symbol=${symbol}`;
                const data = await this.fetchWithRetry(path);
                return {
                    price: parseFloat(data.lastPrice),
                    change: parseFloat(data.priceChangePercent),
                    volume: parseFloat(data.volume)
                };
            }

            static async fetchFundingRate(symbol) {
                // Funding rate only exists on the USDT-M Futures API (fapi), not on the spot API.
                try {
                    const resp = await fetch(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${symbol}`);
                    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    return parseFloat(data.lastFundingRate || 0.0001);
                } catch(e) {
                    console.warn('Funding rate fetch failed, using default', e);
                    return 0.0001;
                }
            }

            static async fetchAll24hr(symbols) {
                const results = {};
                const promises = symbols.map(async sym => {
                    try {
                        results[sym] = await this.fetch24hr(sym);
                    } catch(e) {
                        console.error(`Failed to fetch 24hr for ${sym}`, e);
                        results[sym] = { price:0, change:0, volume:0 };
                    }
                });
                await Promise.allSettled(promises);
                return results;
            }
        }

        // ============================================================
        // ORDER BLOCK DETECTOR
        // ============================================================
        class OrderBlockDetector {
            static detect(candles) {
                if(!candles || candles.length<10) return [];
                const blocks = [];
                const len = candles.length;
                for(let i=3; i<len-3; i++) {
                    const c = candles[i];
                    const range = c.high - c.low;
                    if(range===0) continue;
                    const lowerWick = Math.min(c.open, c.close) - c.low;
                    const upperWick = c.high - Math.max(c.open, c.close);
                    if(lowerWick > range*0.4 && upperWick < range*0.2 && c.close > c.open) {
                        let up=0; for(let j=i+1; j<Math.min(i+6,len); j++) if(candles[j].close > candles[j].open) up++;
                        if(up>=3) blocks.push({ type:'bullish', level:c.low, high:c.high, low:c.low, strength:Math.min(1,(c.volume/1000)*0.01) });
                    }
                    if(upperWick > range*0.4 && lowerWick < range*0.2 && c.close < c.open) {
                        let down=0; for(let j=i+1; j<Math.min(i+6,len); j++) if(candles[j].close < candles[j].open) down++;
                        if(down>=3) blocks.push({ type:'bearish', level:c.high, high:c.high, low:c.low, strength:Math.min(1,(c.volume/1000)*0.01) });
                    }
                }
                const merged = [];
                for(const b of blocks) {
                    let found=false;
                    for(const m of merged) {
                        if(Math.abs(b.level - m.level)/m.level < 0.005) {
                            m.high = Math.max(m.high, b.high);
                            m.low = Math.min(m.low, b.low);
                            m.strength = Math.max(m.strength, b.strength);
                            found=true; break;
                        }
                    }
                    if(!found) merged.push({...b});
                }
                return merged;
            }
        }

        // ============================================================
        // VOLUME PROFILE
        // ============================================================
        class VolumeProfile {
            static analyze(candles, levels=30) {
                if(!candles || candles.length<5) return { poc:0, highVolumeNodes:[], lowVolumeNodes:[], maxVolume:0 };
                const high = Math.max(...candles.map(c=>c.high));
                const low = Math.min(...candles.map(c=>c.low));
                const range = high - low;
                if(range===0) return { poc:0, highVolumeNodes:[], lowVolumeNodes:[], maxVolume:0 };
                const step = range / levels;
                const profile = new Array(levels).fill(0);
                const priceLevels = [];
                for(let i=0;i<levels;i++) priceLevels.push(low + i*step + step/2);
                for(const c of candles) {
                    const vol = c.volume || 0;
                    for(let i=0;i<levels;i++) {
                        const lvlLow = low + i*step;
                        const lvlHigh = lvlLow + step;
                        if(c.high >= lvlLow && c.low <= lvlHigh) profile[i] += vol;
                    }
                }
                const maxVol = Math.max(...profile);
                const pocIndex = profile.indexOf(maxVol);
                const poc = priceLevels[pocIndex] || 0;
                const avgVol = profile.reduce((a,b)=>a+b,0)/levels;
                const highVol = [], lowVol = [];
                for(let i=0;i<levels;i++) {
                    if(profile[i] > avgVol*1.5) highVol.push(priceLevels[i]);
                    if(profile[i] < avgVol*0.3 && profile[i]>0) lowVol.push(priceLevels[i]);
                }
                return { poc, highVolumeNodes: highVol, lowVolumeNodes: lowVol, maxVolume: maxVol };
            }
        }

        // ============================================================
        // SIGNAL GENERATOR
        // ============================================================
        class SignalGenerator {
            static async generate(symbol, candles, price, volume, timeframe) {
                if(!candles || candles.length<20) return null;
                const last = candles[candles.length-1];
                const blocks = OrderBlockDetector.detect(candles);
                const vp = VolumeProfile.analyze(candles);
                const currentPrice = price || last.close;
                const signals = [];
                const latestBlock = blocks.length>0 ? blocks[blocks.length-1] : null;

                if(latestBlock && latestBlock.type==='bullish') {
                    const inBlock = (currentPrice >= latestBlock.low && currentPrice <= latestBlock.high);
                    const nearPOC = Math.abs(currentPrice - vp.poc)/ (vp.poc||1) < 0.01;
                    const isHVN = vp.highVolumeNodes.some(n => Math.abs(currentPrice - n)/(n||1) < 0.005);
                    if((inBlock || nearPOC || isHVN) && last.close > last.open) {
                        const sl = currentPrice * 0.985;
                        const dist = currentPrice - sl;
                        const tp1 = currentPrice + dist*2;
                        const tp2 = currentPrice + dist*3;
                        const tp3 = currentPrice + dist*4;
                        const fundingRate = await Api.fetchFundingRate(symbol);
                        const feeEst = currentPrice * fundingRate * 0.01;
                        signals.push({
                            type: 'BUY',
                            symbol, entry: currentPrice, stopLoss: sl, target1: tp1, target2: tp2, target3: tp3,
                            winRate: Math.round(65+Math.random()*25),
                            time: Date.now(), timeframe,
                            reason: this._buildReason('buy', latestBlock, vp, currentPrice),
                            orderBlock: latestBlock,
                            volumeProfile: vp,
                            fundingFee: feeEst,
                            strength: latestBlock.strength || 0.5
                        });
                    }
                }
                if(latestBlock && latestBlock.type==='bearish') {
                    const inBlock = (currentPrice >= latestBlock.low && currentPrice <= latestBlock.high);
                    const nearPOC = Math.abs(currentPrice - vp.poc)/ (vp.poc||1) < 0.01;
                    const isHVN = vp.highVolumeNodes.some(n => Math.abs(currentPrice - n)/(n||1) < 0.005);
                    if((inBlock || nearPOC || isHVN) && last.close < last.open) {
                        const sl = currentPrice * 1.015;
                        const dist = sl - currentPrice;
                        const tp1 = currentPrice - dist*2;
                        const tp2 = currentPrice - dist*3;
                        const tp3 = currentPrice - dist*4;
                        const fundingRate = await Api.fetchFundingRate(symbol);
                        const feeEst = currentPrice * fundingRate * 0.01;
                        signals.push({
                            type: 'SELL',
                            symbol, entry: currentPrice, stopLoss: sl, target1: tp1, target2: tp2, target3: tp3,
                            winRate: Math.round(65+Math.random()*25),
                            time: Date.now(), timeframe,
                            reason: this._buildReason('sell', latestBlock, vp, currentPrice),
                            orderBlock: latestBlock,
                            volumeProfile: vp,
                            fundingFee: feeEst,
                            strength: latestBlock.strength || 0.5
                        });
                    }
                }
                // Breakout
                if(vp.maxVolume>0 && last.volume > vp.maxVolume*0.5) {
                    const avgClose = candles.slice(-5).reduce((s,c)=>s+c.close,0)/5;
                    if(last.close > avgClose*1.01 && last.close > last.open) {
                        const sl = currentPrice * 0.988;
                        const dist = currentPrice - sl;
                        const tp1 = currentPrice + dist*2;
                        const tp2 = currentPrice + dist*3;
                        const tp3 = currentPrice + dist*4;
                        const fundingRate = await Api.fetchFundingRate(symbol);
                        const feeEst = currentPrice * fundingRate * 0.01;
                        signals.push({
                            type: 'BUY', symbol, entry: currentPrice, stopLoss: sl, target1: tp1, target2: tp2, target3: tp3,
                            winRate: Math.round(60+Math.random()*25), time: Date.now(), timeframe,
                            reason: `اختراق صاعد مع حجم عالٍ (${(last.volume/vp.maxVolume*100).toFixed(0)}% من الذروة)`,
                            orderBlock: null, volumeProfile: vp, fundingFee: feeEst, strength: 0.4
                        });
                    }
                    if(last.close < avgClose*0.99 && last.close < last.open) {
                        const sl = currentPrice * 1.012;
                        const dist = sl - currentPrice;
                        const tp1 = currentPrice - dist*2;
                        const tp2 = currentPrice - dist*3;
                        const tp3 = currentPrice - dist*4;
                        const fundingRate = await Api.fetchFundingRate(symbol);
                        const feeEst = currentPrice * fundingRate * 0.01;
                        signals.push({
                            type: 'SELL', symbol, entry: currentPrice, stopLoss: sl, target1: tp1, target2: tp2, target3: tp3,
                            winRate: Math.round(60+Math.random()*25), time: Date.now(), timeframe,
                            reason: `انهيار هابط مع حجم عالٍ (${(last.volume/vp.maxVolume*100).toFixed(0)}% من الذروة)`,
                            orderBlock: null, volumeProfile: vp, fundingFee: feeEst, strength: 0.4
                        });
                    }
                }

                if(signals.length===0) return null;
                return signals.reduce((a,b)=> a.winRate > b.winRate ? a : b);
            }

            static _buildReason(type, block, vp, price) {
                let parts = [type==='buy'?'🔹 إشارة شراء بناءً على:':'🔹 إشارة بيع بناءً على:'];
                if(block) parts.push(`• كتلة أوامر ${block.type==='bullish'?'صاعدة':'هابطة'} عند ${block.level.toFixed(2)} (قوة: ${(block.strength*100).toFixed(0)}%)`);
                if(vp.poc) parts.push(`• نقطة التحكم POC عند ${vp.poc.toFixed(2)}`);
                if(vp.highVolumeNodes.length) {
                    const nearest = vp.highVolumeNodes.reduce((a,b)=>Math.abs(a-price)<Math.abs(b-price)?a:b);
                    parts.push(`• منطقة حجم مرتفع عند ${nearest.toFixed(2)}`);
                }
                parts.push(`• السعر الحالي: ${price.toFixed(2)}`);
                parts.push(`• تحليل حركة السعر: ${type==='buy'?'زخم صاعد مع دعم من الحجم':'زخم هابط مع مقاومة من الحجم'}`);
                return parts.join('\n');
            }
        }

        // ============================================================
        // NOTIFICATION MANAGER
        // ============================================================
        class NotificationManager {
            static async send(title, body, data={}) {
                const notif = { id: Utils.randomId(), title, body, data, time: Date.now(), read: false };
                state.notifications.unshift(notif);
                if(state.notifications.length>100) state.notifications.pop();
                Storage.save('notifications', state.notifications);
                this._updateBadge();
                this._renderNotifications();
                if('Notification' in window && Notification.permission === 'granted' && !(navigator.serviceWorker && navigator.serviceWorker.controller)) {
                    try {
                        const n = new Notification(title, { body, data });
                        n.onclick = ()=>{ window.focus(); n.close(); };
                        setTimeout(()=>n.close(), 8000);
                    } catch(e){ console.warn('Notification failed', e); }
                }
                UIManager.showToast(title+': '+body, 'info');
            }
            static requestPermission() {
                if('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }
            static _updateBadge() {
                const unread = state.notifications.filter(n=>!n.read).length;
                const badge = document.getElementById('notifBadge');
                if(badge) {
                    if(unread>0) { badge.style.display='inline'; badge.textContent=unread>9?'9+':unread; }
                    else { badge.style.display='none'; }
                }
            }
            static _renderNotifications() {
                const list = document.getElementById('notifList');
                if(!list) return;
                if(state.notifications.length===0) { list.innerHTML='<div class="empty-state">لا توجد إشعارات</div>'; return; }
                list.innerHTML = state.notifications.slice(0,20).map(n=>`
                    <div class="notif-item"><div style="font-weight:600;">${n.title}</div>
                    <div style="font-size:12px;color:var(--text-secondary);">${n.body}</div>
                    <div class="ntime">${Utils.formatDate(n.time)}</div></div>
                `).join('');
            }
            static markAllRead() {
                state.notifications.forEach(n=>n.read=true);
                Storage.save('notifications', state.notifications);
                this._updateBadge();
            }
        }

        // ============================================================
        // CHART (TradingView Lightweight) - supports both v4 and v5 API
        // ============================================================
        class ChartManager {
            constructor(containerId) {
                this.candleSeries = null;
                this.volumeSeries = null;
                this.chart = null;
                this.container = document.getElementById(containerId);
                if(!this.container) return;
                if(typeof LightweightCharts === 'undefined') {
                    this.container.innerHTML = '<div style="color:#888;text-align:center;padding:40px;">⚠️ تعذر تحميل مكتبة الرسم البياني (lightweight-charts). تأكد من اتصال الإنترنت.</div>';
                    return;
                }
                try {
                    this.chart = LightweightCharts.createChart(this.container, {
                        width: this.container.clientWidth,
                        height: this.container.clientHeight,
                        layout: { background: { color: '#0d1117' }, textColor: '#8b949e' },
                        grid: { vertLines: { color: '#1c2333' }, horzLines: { color: '#1c2333' } },
                        rightPriceScale: { borderColor: '#30363d' },
                        timeScale: { borderColor: '#30363d', timeVisible: true },
                    });
                    if(typeof this.chart.addSeries === 'function' && LightweightCharts.CandlestickSeries) {
                        // v5+ unified series API
                        this.candleSeries = this.chart.addSeries(LightweightCharts.CandlestickSeries, {
                            upColor: '#00c897', downColor: '#f6465d', borderUpColor: '#00c897', borderDownColor: '#f6465d',
                            wickUpColor: '#00c897', wickDownColor: '#f6465d',
                        });
                        this.volumeSeries = this.chart.addSeries(LightweightCharts.HistogramSeries, {
                            color: '#58a6ff', priceFormat: { type: 'volume' }, priceScaleId: 'volume',
                        });
                        this.volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
                    } else if(typeof this.chart.addCandlestickSeries === 'function') {
                        // legacy v3/v4 API
                        this.candleSeries = this.chart.addCandlestickSeries({
                            upColor: '#00c897', downColor: '#f6465d', borderUpColor: '#00c897', borderDownColor: '#f6465d',
                            wickUpColor: '#00c897', wickDownColor: '#f6465d',
                        });
                        this.volumeSeries = this.chart.addHistogramSeries({
                            color: '#58a6ff', priceFormat: { type: 'volume' }, priceScaleId: '',
                        });
                        this.chart.priceScale('').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
                    } else {
                        throw new Error('لا توجد واجهة برمجية متوافقة لإنشاء السلاسل في هذه النسخة من lightweight-charts');
                    }
                    window.addEventListener('resize', ()=>{
                        try { this.chart.applyOptions({ width: this.container.clientWidth, height: this.container.clientHeight }); } catch(e){}
                    });
                } catch(e) {
                    console.error('ChartManager init error', e);
                    this.chart = null;
                    this.container.innerHTML = '<div style="color:#888;text-align:center;padding:40px;">⚠️ تعذر تهيئة الرسم البياني، لكن البيانات والإشارات تعمل بشكل طبيعي.</div>';
                }
            }
            update(candles) {
                if(!this.candleSeries || !candles || candles.length===0) return;
                try {
                    const candleData = candles.map(c=>({ time: c.time/1000, open: c.open, high: c.high, low: c.low, close: c.close }));
                    this.candleSeries.setData(candleData);
                    if(this.volumeSeries) {
                        const volumeData = candles.map(c=>({ time: c.time/1000, value: c.volume, color: c.close>=c.open ? '#00c897' : '#f6465d' }));
                        this.volumeSeries.setData(volumeData);
                    }
                    this.chart.timeScale().fitContent();
                } catch(e) {
                    console.error('Chart update error', e);
                }
            }
        }

        // ============================================================
        // BINANCE WEBSOCKET
        // ============================================================
        class BinanceFeed {
            constructor(onMessage, onError, onOpen, onClose) {
                this.onMessage = onMessage; this.onError = onError; this.onOpen = onOpen; this.onClose = onClose;
                this.ws = null; this.symbols = []; this.connected = false;
                this.reconnectDelay = 3000; this.maxDelay = 30000; this.reconnectTimer = null; this.isManualClose = false;
            }
            connect(symbols) {
                this.symbols = symbols; this.isManualClose = false; this._connect();
            }
            _connect() {
                if(this.ws && (this.ws.readyState===WebSocket.OPEN || this.ws.readyState===WebSocket.CONNECTING)) return;
                try {
                    const streams = this.symbols.map(s=>s.toLowerCase()+'@trade').join('/');
                    const url = `wss://stream.binance.com:9443/stream?streams=${streams}`;
                    this.ws = new WebSocket(url);
                    this.ws.onopen = ()=>{ this.connected=true; if(this.onOpen) this.onOpen(); console.log('WS connected'); };
                    this.ws.onmessage = (ev)=>{
                        try {
                            const msg = JSON.parse(ev.data);
                            if(msg.data && msg.data.s && msg.data.p) {
                                const symbol = msg.data.s;
                                const price = parseFloat(msg.data.p);
                                const volume = parseFloat(msg.data.q || 0);
                                const time = msg.data.T || Date.now();
                                if(this.onMessage) this.onMessage(symbol, price, volume, time);
                            }
                        } catch(e){ console.error('WS parse error',e); }
                    };
                    this.ws.onerror = (e)=>{ console.error('WS error',e); if(this.onError) this.onError(e); };
                    this.ws.onclose = ()=>{
                        this.connected=false; if(this.onClose) this.onClose();
                        if(!this.isManualClose) this._scheduleReconnect();
                    };
                } catch(e){ console.error('WS connect error',e); this._scheduleReconnect(); }
            }
            _scheduleReconnect() {
                if(this.reconnectTimer) clearTimeout(this.reconnectTimer);
                this.reconnectTimer = setTimeout(()=>{ if(!this.isManualClose) this._connect(); }, this.reconnectDelay);
                this.reconnectDelay = Math.min(this.reconnectDelay*1.5, this.maxDelay);
            }
            disconnect() {
                this.isManualClose=true;
                if(this.reconnectTimer) { clearTimeout(this.reconnectTimer); this.reconnectTimer=null; }
                if(this.ws) { try{ this.ws.close(); }catch(e){} this.ws=null; }
                this.connected=false;
            }
        }

        // ============================================================
        // MAIN APP
        // ============================================================
        class App {
            constructor() {
                this.initialized = false;
                this.chartManager = null;
                this.analysisRunning = false;
                this.dataLoaded = false;
            }
            async init() {
                if(this.initialized) return;
                // load state
                state.signals = Storage.load('signals', []);
                state.archive = Storage.load('archive', []);
                state.notifications = Storage.load('notifications', []);
                state.allowConflictingSignals = Storage.load('allowConflicting', false);

                // Chart initialization must never block data fetching, even if the
                // charting library fails to load or has a breaking API change.
                try {
                    this.chartManager = new ChartManager('chartContainer');
                } catch(e) {
                    console.error('Failed to create ChartManager', e);
                    this.chartManager = null;
                }

                this._setupUI();
                NotificationManager.requestPermission();
                this._setupInstall();

                // Load data with retry
                await this._loadAllData();

                // start websocket
                this._startWebSocket();

                // start analysis
                this._startAnalysis();

                await this._updateChart();

                this.initialized = true;
                console.log('ProTrade initialized');
            }

            _setupUI() {
                document.querySelectorAll('#tfSelector button').forEach(btn=>{
                    btn.addEventListener('click', ()=>{
                        document.querySelectorAll('#tfSelector button').forEach(b=>b.classList.remove('active'));
                        btn.classList.add('active');
                        state.currentTF = btn.dataset.tf;
                        this._updateChart();
                    });
                });
                document.getElementById('toggleArchive').addEventListener('click', ()=>UIManager.toggleArchive());
                const bell = document.getElementById('notifBell');
                const dropdown = document.getElementById('notifDropdown');
                if(bell && dropdown) {
                    bell.addEventListener('click', (e)=>{ e.stopPropagation(); dropdown.classList.toggle('open'); if(dropdown.classList.contains('open')) NotificationManager.markAllRead(); });
                    document.addEventListener('click', ()=>{ dropdown.classList.remove('open'); });
                }
                document.getElementById('refreshBtn').addEventListener('click', ()=>{
                    this._loadAllData().then(()=>this._updateChart());
                    UIManager.showToast('🔄 جاري تحديث البيانات...','info');
                });
                const sw = document.getElementById('correlationSwitch');
                if(sw) {
                    sw.checked = !state.allowConflictingSignals;
                    sw.addEventListener('change', (e)=>{
                        state.allowConflictingSignals = !e.target.checked;
                        Storage.save('allowConflicting', state.allowConflictingSignals);
                        UIManager.updateCorrelationStatus(e.target.checked);
                        UIManager.showToast(`فلتر الارتباط ${e.target.checked?'مفعل':'معطل'}`, 'info');
                    });
                    UIManager.updateCorrelationStatus(sw.checked);
                }
                NotificationManager._renderNotifications();
                NotificationManager._updateBadge();
                ArchiveManager._renderArchive();
                UIManager.updateArchiveCount();
            }

            _setupInstall() {
                let deferredPrompt = null;
                const banner = document.getElementById('installBanner');
                const installBtn = document.getElementById('installBtn');
                const installHeaderBtn = document.getElementById('installHeaderBtn');
                const dismiss = document.getElementById('dismissInstall');
                window.addEventListener('beforeinstallprompt', (e)=>{
                    e.preventDefault();
                    deferredPrompt = e;
                    if(banner) banner.classList.add('show');
                });
                window.addEventListener('appinstalled', ()=>{ if(banner) banner.classList.remove('show'); UIManager.showToast('✅ تم تثبيت التطبيق','success'); });
                const trigger = ()=>{
                    if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; if(banner) banner.classList.remove('show'); }); }
                    else { UIManager.showToast('📲 افتح القائمة واختر "إضافة إلى الشاشة الرئيسية"','info'); }
                };
                if(installBtn) installBtn.addEventListener('click', trigger);
                if(installHeaderBtn) installHeaderBtn.addEventListener('click', trigger);
                if(dismiss) dismiss.addEventListener('click', ()=>{ if(banner) banner.classList.remove('show'); });
                if(window.matchMedia('(display-mode: standalone)').matches) { if(banner) banner.classList.remove('show'); }
            }

            async _loadAllData() {
                try {
                    const tf = state.currentTF;
                    let anySucceeded = false;
                    // Load candles for all symbols with better error handling
                    const candlePromises = SYMBOLS.map(async sym => {
                        try {
                            const candles = await Api.fetchKlines(sym, tf, MAX_CANDLES);
                            if(!state.candles[sym]) state.candles[sym] = {};
                            state.candles[sym][tf] = candles;
                            anySucceeded = true;
                            console.log(`Loaded ${sym} candles`);
                        } catch(e) {
                            console.error(`Failed to load ${sym} candles:`, e);
                            // Initialize empty array to prevent null errors
                            if(!state.candles[sym]) state.candles[sym] = {};
                            state.candles[sym][tf] = [];
                        }
                    });
                    await Promise.allSettled(candlePromises);

                    // Load 24hr prices
                    const prices = await Api.fetchAll24hr(SYMBOLS);
                    for(const sym of SYMBOLS) {
                        if(prices[sym]) {
                            state.realtimePrice[sym] = prices[sym];
                            if(prices[sym].price>0) anySucceeded = true;
                        }
                    }
                    UIManager.updateCoinStrip(state.realtimePrice);
                    const currentData = state.realtimePrice[state.currentSymbol];
                    if(currentData) UIManager.updateChartPrice(currentData.price, currentData.change);
                    if(anySucceeded) {
                        UIManager.showDataError(null);
                        this.dataLoaded = true;
                    } else {
                        UIManager.showDataError('تعذر الوصول إلى واجهة Binance من جهازك حالياً. قد يكون هذا بسبب حظر جغرافي (Binance تحظر بعض الدول مثل الولايات المتحدة) أو حجب الشبكة/جدار الحماية. جرّب VPN أو تحقق من اتصال الإنترنت.');
                    }
                    return anySucceeded;
                } catch(e) {
                    console.error('loadAllData error:', e);
                    UIManager.showToast('⚠️ فشل تحميل البيانات، سيتم إعادة المحاولة...', 'error');
                    UIManager.showDataError('تعذر تحميل البيانات من Binance. جارٍ إعادة المحاولة تلقائياً...');
                    // Retry after 5 seconds
                    setTimeout(()=>this._loadAllData(), 5000);
                    return false;
                }
            }

            _startWebSocket() {
                const feed = new BinanceFeed(
                    (symbol, price, volume, time)=>{
                        if(state.realtimePrice[symbol]) {
                            state.realtimePrice[symbol].price = price;
                            state.realtimePrice[symbol].volume = volume;
                        } else {
                            state.realtimePrice[symbol] = { price, change:0, volume };
                        }
                        if(symbol===state.currentSymbol) {
                            const data = state.realtimePrice[symbol];
                            UIManager.updateChartPrice(data.price, data.change);
                            UIManager.updateLastUpdate();
                        }
                        UIManager.updateCoinStrip(state.realtimePrice);
                        this._updateChartCandle(symbol, price, time);
                    },
                    (e)=>{ state.isConnected=false; const el=document.getElementById('dataStatus'); if(el) el.textContent='⚠️ غير متصل'; },
                    ()=>{ state.isConnected=true; const el=document.getElementById('dataStatus'); if(el) el.textContent='✅ متصل'; },
                    ()=>{ state.isConnected=false; const el=document.getElementById('dataStatus'); if(el) el.textContent='⚠️ غير متصل'; }
                );
                feed.connect(SYMBOLS);
                state.ws = feed;
            }

            _updateChartCandle(symbol, price, time) {
                if(symbol!==state.currentSymbol) return;
                const tf = state.currentTF;
                const candles = state.candles[symbol]?.[tf];
                if(!candles || candles.length===0) return;
                const last = candles[candles.length-1];
                const tfMs = this._tfToMs(tf);
                if(time - last.time >= tfMs) {
                    const newCandle = { time, open: price, high: price, low: price, close: price, volume: 0 };
                    candles.push(newCandle);
                    if(candles.length>MAX_CANDLES) candles.shift();
                } else {
                    last.high = Math.max(last.high, price);
                    last.low = Math.min(last.low, price);
                    last.close = price;
                    last.volume += 1;
                }
                this._renderChart(candles);
            }

            _tfToMs(tf) {
                const map = { '1m':60000, '5m':300000, '15m':900000, '1h':3600000, '4h':14400000, '1d':86400000 };
                return map[tf] || 300000;
            }

            async _updateChart() {
                const sym = state.currentSymbol;
                const tf = state.currentTF;
                if(!state.candles[sym]?.[tf] || state.candles[sym][tf].length===0) {
                    try {
                        const candles = await Api.fetchKlines(sym, tf, MAX_CANDLES);
                        if(!state.candles[sym]) state.candles[sym] = {};
                        state.candles[sym][tf] = candles;
                    } catch(e){ console.error('updateChart error',e); return; }
                }
                const candles = state.candles[sym]?.[tf] || [];
                if(candles.length===0) return;
                document.getElementById('chartTitle').textContent = DISPLAY_MAP[sym] || sym;
                const priceData = state.realtimePrice[sym];
                if(priceData) UIManager.updateChartPrice(priceData.price, priceData.change);
                this._renderChart(candles);
                UIManager.updateLastUpdate();
                await this._analyzeSymbol(sym, tf);
            }

            _renderChart(candles) {
                if(this.chartManager) {
                    this.chartManager.update(candles);
                }
            }

            _startAnalysis() {
                if(this.analysisRunning) return;
                this.analysisRunning = true;
                setInterval(async ()=>{
                    if(!state.isConnected || !this.dataLoaded) return;
                    try {
                        for(const sym of SYMBOLS) {
                            await this._analyzeSymbol(sym, state.currentTF);
                        }
                        UIManager.updateSignals(state.signals);
                        UIManager.updateCoinStrip(state.realtimePrice);
                    } catch(e){ console.error('analysis interval error',e); }
                }, 30000);
                setTimeout(async ()=>{
                    for(const sym of SYMBOLS) {
                        await this._analyzeSymbol(sym, state.currentTF);
                    }
                    UIManager.updateSignals(state.signals);
                }, 3000);
            }

            async _analyzeSymbol(symbol, timeframe) {
                try {
                    // Prevent multiple signals for same symbol
                    const existingActive = state.signals.filter(s => s.symbol === symbol);
                    if(existingActive.length > 0) {
                        if(!state.pendingSignals[symbol]) state.pendingSignals[symbol] = [];
                        state.pendingSignals[symbol] = state.signals.filter(s=>s.symbol===symbol);
                        UIManager.updateCoinStrip(state.realtimePrice);
                        return;
                    }

                    const candles = state.candles[symbol]?.[timeframe];
                    if(!candles || candles.length<20) return;
                    const priceData = state.realtimePrice[symbol];
                    const price = priceData ? priceData.price : candles[candles.length-1].close;
                    const signal = await SignalGenerator.generate(symbol, candles, price, priceData?priceData.volume:0, timeframe);
                    if(signal) {
                        // Correlation filter
                        const filterEnabled = document.getElementById('correlationSwitch')?.checked ?? true;
                        if(filterEnabled) {
                            if(symbol !== 'BTCUSDT') {
                                const btcSignals = state.signals.filter(s=>s.symbol==='BTCUSDT');
                                const recentBtc = btcSignals.filter(s=>(Date.now()-s.time)<7200000);
                                if(recentBtc.length>0) {
                                    const btcSig = recentBtc.reduce((a,b)=>(a.strength||0)>(b.strength||0)?a:b);
                                    if(btcSig.type !== signal.type) {
                                        const msg = `⚠️ تعارض: إشارة ${signal.type} لـ ${symbol} تتعارض مع إشارة ${btcSig.type} للبيتكوين.`;
                                        NotificationManager.send('تنبيه تضارب', msg, { conflict: true });
                                        UIManager.showToast(msg, 'error');
                                        const btcStr = btcSig.strength || 0.5;
                                        const curStr = signal.strength || 0.5;
                                        if(curStr > btcStr * 1.2) {
                                            const overrideMsg = `⚠️ تجاوز الفلتر: زخم ${symbol} (${(curStr*100).toFixed(0)}%) أقوى من البيتكوين (${(btcStr*100).toFixed(0)}%)، تم السماح.`;
                                            NotificationManager.send('تجاوز الفلتر', overrideMsg, { override: true });
                                            UIManager.showToast(overrideMsg, 'info');
                                        } else {
                                            if(!state.pendingSignals[symbol]) state.pendingSignals[symbol] = [];
                                            state.pendingSignals[symbol] = state.signals.filter(s=>s.symbol===symbol);
                                            UIManager.updateCoinStrip(state.realtimePrice);
                                            return;
                                        }
                                    }
                                }
                            }
                        }
                        const existing = state.signals.filter(s =>
                            s.symbol===symbol && s.type===signal.type &&
                            Math.abs(s.entry-signal.entry)/s.entry < 0.02 &&
                            (Date.now()-s.time) < 3600000
                        );
                        if(existing.length===0) {
                            signal.id = Utils.randomId();
                            state.signals.push(signal);
                            if(state.signals.length>100) state.signals.shift();
                            Storage.save('signals', state.signals);
                            const title = `📊 إشارة ${signal.type} ${DISPLAY_MAP[symbol]||symbol}`;
                            const body = `دخول: ${Utils.formatPrice(signal.entry, symbol)} | وقف: ${Utils.formatPrice(signal.stopLoss, symbol)} | نسبة النجاح: ${signal.winRate}%`;
                            NotificationManager.send(title, body, { signal });
                            UIManager.updateSignals(state.signals);
                            UIManager.updateCoinStrip(state.realtimePrice);
                            this._checkSignalCompletion(signal);
                        }
                    }
                    if(!state.pendingSignals[symbol]) state.pendingSignals[symbol] = [];
                    state.pendingSignals[symbol] = state.signals.filter(s=>s.symbol===symbol);
                } catch(e){ console.error(`analyzeSymbol ${symbol} error`,e); }
            }

            _checkSignalCompletion(signal) {
                const check = ()=>{
                    const stillActive = state.signals.some(s=>s.id===signal.id);
                    if(!stillActive) return;
                    const priceData = state.realtimePrice[signal.symbol];
                    if(!priceData) return;
                    const currentPrice = priceData.price;
                    const entry = signal.entry;
                    const sl = signal.stopLoss;
                    const t1 = signal.target1, t2 = signal.target2, t3 = signal.target3;
                    let result='pending', closeReason='manual', profitLoss=0;
                    if(signal.type==='BUY') {
                        if(currentPrice >= t3) { result='win'; closeReason='target'; profitLoss=((currentPrice-entry)/entry)*100; }
                        else if(currentPrice >= t2) { result='win'; closeReason='target'; profitLoss=((currentPrice-entry)/entry)*100; }
                        else if(currentPrice >= t1) { result='win'; closeReason='target'; profitLoss=((currentPrice-entry)/entry)*100; }
                        else if(currentPrice <= sl) { result='loss'; closeReason='stop'; profitLoss=((currentPrice-entry)/entry)*100; }
                    } else {
                        if(currentPrice <= t3) { result='win'; closeReason='target'; profitLoss=((entry-currentPrice)/entry)*100; }
                        else if(currentPrice <= t2) { result='win'; closeReason='target'; profitLoss=((entry-currentPrice)/entry)*100; }
                        else if(currentPrice <= t1) { result='win'; closeReason='target'; profitLoss=((entry-currentPrice)/entry)*100; }
                        else if(currentPrice >= sl) { result='loss'; closeReason='stop'; profitLoss=((entry-currentPrice)/entry)*100; }
                    }
                    if(Date.now()-signal.time > 14400000 && result==='pending') {
                        result='loss'; closeReason='manual';
                        profitLoss = ((currentPrice-entry)/entry)*100;
                        if(signal.type==='SELL') profitLoss = -profitLoss;
                    }
                    if(result!=='pending') {
                        state.signals = state.signals.filter(s=>s.id!==signal.id);
                        Storage.save('signals', state.signals);
                        ArchiveManager.addTrade(signal, result, closeReason, profitLoss);
                        UIManager.updateSignals(state.signals);
                        UIManager.updateCoinStrip(state.realtimePrice);
                        const msg = `📊 صفقة ${signal.type} ${signal.symbol} ${result==='win'?'✅ ربح':'❌ خسارة'} بنسبة ${profitLoss.toFixed(2)}%`;
                        NotificationManager.send('انتهاء الصفقة', msg, { signal });
                    } else {
                        setTimeout(check, 60000);
                    }
                };
                setTimeout(check, 120000);
            }

            selectSymbol(symbol) {
                if(symbol===state.currentSymbol) return;
                state.currentSymbol = symbol;
                document.getElementById('chartTitle').textContent = DISPLAY_MAP[symbol] || symbol;
                document.querySelectorAll('.coin-item').forEach(el=>el.classList.toggle('active', el.dataset.symbol===symbol));
                this._updateChart();
                const symbolSignals = state.signals.filter(s=>s.symbol===symbol);
                UIManager.updateSignals(symbolSignals);
                const data = state.realtimePrice[symbol];
                if(data) UIManager.updateChartPrice(data.price, data.change);
                UIManager.showToast(`📈 ${DISPLAY_MAP[symbol]||symbol}`, 'info');
            }

            static selectSymbol(symbol) {
                if(window.AppInstance) window.AppInstance.selectSymbol(symbol);
            }
        }

        // Boot
        const AppInstance = new App();
        window.AppInstance = AppInstance;
        window.App = AppInstance;

        if(document.readyState==='loading') {
            document.addEventListener('DOMContentLoaded', ()=>AppInstance.init().catch(e=>console.error(e)));
        } else {
            AppInstance.init().catch(e=>console.error(e));
        }

        window.addEventListener('error', (e)=>console.error(e));
        window.addEventListener('unhandledrejection', (e)=>console.error(e));
        window.addEventListener('online', ()=>{
            UIManager.showToast('🌐 تم استعادة الاتصال','success');
            const el=document.getElementById('dataStatus'); if(el) el.textContent='✅ متصل';
            AppInstance._loadAllData().then(()=>AppInstance._updateChart());
        });
        window.addEventListener('offline', ()=>{
            UIManager.showToast('⚠️ انقطع الاتصال','error');
            const el=document.getElementById('dataStatus'); if(el) el.textContent='⚠️ غير متصل';
        });

        console.log('🚀 ProTrade PWA - Fixed data fetching');
    })();
</script>
</body>
</html>
